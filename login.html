<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPRCAS Login</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background:linear-gradient(135deg,#1e3c72,#2a5298);
    }

    .login-container{
        width:380px;
        background:#fff;
        padding:35px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        text-align:center;
    }

    .logo{
        width:120px;
        margin-bottom:15px;
    }

    h2{
        color:#1e3c72;
        margin-bottom:5px;
    }

    .subtitle{
        color:#666;
        font-size:14px;
        margin-bottom:25px;
    }

    .input-group{
        margin-bottom:18px;
        text-align:left;
    }

    .input-group label{
        display:block;
        margin-bottom:6px;
        font-weight:600;
        color:#333;
    }

    .input-group input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
        transition:0.3s;
    }

    .input-group input:focus{
        border-color:#2a5298;
        box-shadow:0 0 5px rgba(42,82,152,0.3);
    }

    .login-btn{
        width:100%;
        padding:12px;
        background:#2a5298;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .login-btn:hover{
        background:#1e3c72;
    }

    .links{
        margin-top:15px;
        font-size:14px;
    }

    .links a{
        color:#2a5298;
        text-decoration:none;
    }

    .links a:hover{
        text-decoration:underline;
    }
</style>
</head>
<body>

<div class="login-container">

    <!-- College Logo -->
    <img src="images.jpg" alt="KPRCAS Logo" class="logo">

    <h2>KPR College of Arts & Science</h2>
    <p class="subtitle">Learn Beyond</p>

    <form>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="links">
            <a href="#">Forgot Password?</a>
        </div>
    </form>

</div>

</body>
</html>
